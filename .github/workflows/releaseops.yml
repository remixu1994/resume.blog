name: ReleaseOps

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Optional release identifier for the rollback note
        required: false
        type: string
      healthcheck_url:
        description: Production healthcheck URL
        required: true
        type: string
      migrations_checked:
        description: Confirm migrations/rollback plan were reviewed
        required: true
        default: false
        type: boolean
      healthcheck_samples:
        description: Consecutive successful probes required
        required: false
        default: '3'
        type: string
      healthcheck_timeout_ms:
        description: Per-probe timeout in milliseconds
        required: false
        default: '5000'
        type: string
  workflow_call:
    inputs:
      release_id:
        required: false
        type: string
      healthcheck_url:
        required: true
        type: string
      migrations_checked:
        required: true
        type: boolean
      healthcheck_samples:
        required: false
        default: '3'
        type: string
      healthcheck_timeout_ms:
        required: false
        default: '5000'
        type: string

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_ID: ${{ inputs.release_id }}
      RELEASEOPS_HEALTHCHECK_URL: ${{ inputs.healthcheck_url }}
      RELEASEOPS_MIGRATIONS_CHECKED: ${{ inputs.migrations_checked }}
      RELEASEOPS_HEALTHCHECK_SAMPLES: ${{ inputs.healthcheck_samples }}
      RELEASEOPS_HEALTHCHECK_TIMEOUT_MS: ${{ inputs.healthcheck_timeout_ms }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run releaseops:gate

      - name: Upload rollback notes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-notes
          path: docs/releaseops/rollback-notes
          if-no-files-found: error
